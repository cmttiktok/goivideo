<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina OTT - OpenRelay Version</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --accent: #ff007b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Video lấp đầy phần trên, fix co giãn mọi màn hình */
        .video-wrapper { 
            position: relative; 
            flex: 1;
            width: 100vw; 
            background: #111;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #remote-video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        #local-video { 
            position: absolute; top: 15px; right: 15px; width: 100px; height: 140px; 
            border-radius: 12px; border: 2px solid var(--neon); object-fit: cover; z-index: 10;
            background: #222; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        /* Nút điều khiển */
        .controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 20;
        }
        .btn-round { 
            width: 50px; height: 50px; border-radius: 50%; border: none; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-call { background: #22c55e; color: white; }
        .btn-end { background: #ef4444; color: white; }
        .btn-util { background: rgba(255,255,255,0.2); color: white; backdrop-filter: blur(10px); }
        .btn-off { background: #555 !important; color: #ff4d4d !important; }

        /* Chat */
        .chat-section { height: 38vh; background: #0a0a0a; display: flex; flex-direction: column; border-top: 1px solid #333; }
        #chat-box { flex: 1; overflow-y: auto; padding: 12px; font-size: 14px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 8px 14px; border-radius: 15px; max-width: 85%; }
        .msg.me { background: #007aff; align-self: flex-end; }
        .msg.peer { background: #26262b; align-self: flex-start; }

        .input-area { padding: 10px; display: flex; gap: 8px; background: #111; align-items: center; }
        input[type="text"] { flex: 1; padding: 10px 15px; border-radius: 20px; border: none; background: #222; color: white; outline: none; }
        
        .id-bar { 
            position: absolute; top: 15px; left: 15px; z-index: 20; font-size: 11px; 
            background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--neon); 
        }
    </style>
</head>
<body>

    <div class="id-bar">
        ID: <span id="my-id" style="color:var(--neon); font-weight:bold;">...</span> | 
        <input id="peer-id-input" type="number" placeholder="Nhập mã" style="width: 65px; background: transparent; color: white; border: none; outline: none; font-weight: bold;">
    </div>

    <div class="video-wrapper">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        
        <div class="controls">
            <button class="btn-round btn-util" onclick="toggleMic()" id="mic-btn">🎙️</button>
            <button class="btn-round btn-util" onclick="toggleCam()" id="cam-btn">📹</button>
            <button class="btn-round btn-call" onclick="makeCall()">📞</button>
            <button class="btn-round btn-end" onclick="endCall()">🛑</button>
        </div>
    </div>

    <div class="chat-section">
        <div id="chat-box"></div>
        <div class="input-area">
            <label style="cursor: pointer;">🖼️<input type="file" id="file-input" hidden accept="image/*"></label>
            <input type="text" id="chat-input" placeholder="Nhập tin nhắn...">
            <button onclick="sendMsg()" style="background:none; border:none; color:var(--neon); font-size: 22px;">🚀</button>
        </div>
    </div>

    <script>
        const customId = Math.floor(100000 + Math.random() * 900000).toString();
        
        // CẤU HÌNH CÁCH 3: DÙNG OPENRELAY (MIỄN PHÍ KHÔNG GIỚI HẠN)
        const peer = new Peer(customId, {
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { 
                        urls: 'turn:openrelay.metered.ca:443', 
                        username: 'openrelayproject', 
                        credential: 'openrelayproject' 
                    },
                    { 
                        urls: 'turn:openrelay.metered.ca:80', 
                        username: 'openrelayproject', 
                        credential: 'openrelayproject' 
                    }
                ],
                'sdpSemantics': 'unified-plan'
            }
        });

        let localStream, currentCall, dataConn;
        let isCamOn = true;

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // Lấy quyền Camera/Mic
        navigator.mediaDevices.getUserMedia({ 
            video: { width: 1280, height: 720 }, 
            audio: true 
        }).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;
        });

        peer.on('call', call => {
            currentCall = call;
            call.answer(localStream);
            setupRemoteStream(call);
        });

        peer.on('connection', conn => {
            dataConn = conn;
            conn.on('data', data => {
                if(data.type === 'text') appendMsg('peer', data.content);
                if(data.type === 'img') appendImg('peer', data.content);
            });
        });

        function makeCall() {
            const id = document.getElementById('peer-id-input').value;
            if(!id) return alert("Chưa nhập ID đối phương");
            dataConn = peer.connect(id);
            currentCall = peer.call(id, localStream);
            setupRemoteStream(currentCall);
        }

        function setupRemoteStream(call) {
            call.on('stream', rs => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = rs;
                rv.play().then(() => { setTimeout(() => { rv.muted = false; }, 1000); })
                .catch(() => { rv.muted = true; rv.play(); });
            });
        }

        function toggleCam() {
            isCamOn = !isCamOn;
            localStream.getVideoTracks()[0].enabled = isCamOn;
            const btn = document.getElementById('cam-btn');
            btn.innerText = isCamOn ? "📹" : "🚫";
            btn.classList.toggle('btn-off', !isCamOn);
        }

        function toggleMic() {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            const btn = document.getElementById('mic-btn');
            btn.innerText = track.enabled ? "🎙️" : "🔇";
            btn.classList.toggle('btn-off', !track.enabled);
        }

        function sendMsg() {
            const txt = document.getElementById('chat-input').value;
            if(!txt || !dataConn) return;
            dataConn.send({type: 'text', content: txt});
            appendMsg('me', txt);
            document.getElementById('chat-input').value = '';
        }

        function appendMsg(sender, text) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            const box = document.getElementById('chat-box');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                dataConn.send({type: 'img', content: reader.result});
                appendImg('me', reader.result);
            };
            reader.readAsDataURL(file);
        };

        function appendImg(sender, src) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = `<img src="${src}" style="max-width:100%; border-radius:10px;">`;
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        function endCall() { location.reload(); }
    </script>
</body>
</html>
