<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina OTT Pro - Kết Nối Yêu Thương</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #ff007f; --cyan: #00f2ff; --success: #22c55e; --danger: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 1. Danh bạ & Status */
        #status-bar { background: rgba(255, 165, 0, 0.9); color: #000; text-align: center; font-size: 13px; font-weight: bold; padding: 8px 0; z-index: 100; backdrop-filter: blur(10px); }
        
        .video-container { position: relative; flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 70px; right: 15px; width: 100px; height: 140px; border-radius: 15px; border: 2px solid var(--cyan); object-fit: cover; z-index: 10; }

        /* 2. Chat & Thả tim */
        #chat-container { position: absolute; bottom: 120px; left: 15px; width: 200px; max-height: 150px; overflow-y: auto; z-index: 30; pointer-events: none; }
        .msg { background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; margin-bottom: 5px; font-size: 13px; border-left: 3px solid var(--cyan); animation: fadeIn 0.3s; }
        #heart-btn { position: absolute; bottom: 120px; right: 20px; font-size: 30px; cursor: pointer; z-index: 30; filter: drop-shadow(0 0 10px var(--neon)); }

        /* 5. Cuộc gọi đến & Nhạc chuông */
        #incoming-box { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95); border: 2px solid var(--neon); padding: 30px;
            border-radius: 30px; text-align: center; z-index: 1000; display: none; width: 80%;
            backdrop-filter: blur(20px); box-shadow: 0 0 50px rgba(255, 0, 127, 0.5);
        }

        /* Danh bạ nhanh */
        .contact-list { position: absolute; top: 120px; left: 15px; z-index: 20; display: flex; flex-direction: column; gap: 10px; }
        .contact-card { background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); font-size: 12px; cursor: pointer; backdrop-filter: blur(5px); }
        .contact-card:hover { border-color: var(--cyan); background: rgba(0,242,255,0.1); }

        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 40; }
        .btn { width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; transition: 0.3s; }
        .btn-call { background: var(--success); color: white; box-shadow: 0 0 15px var(--success); }
        .btn-end { background: var(--danger); color: white; }
        .btn-tool { background: rgba(255,255,255,0.15); color: white; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }

        @keyframes heartFly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) scale(2); opacity: 0; }
        }
        .heart-icon { position: absolute; color: var(--neon); pointer-events: none; animation: heartFly 1s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="status-bar">Hệ thống Mina OTT đang sẵn sàng...</div>

    <div id="incoming-box">
        <div style="font-size: 40px; margin-bottom: 10px;">🔔</div>
        <h3 style="margin:0">Cuộc gọi đến</h3>
        <p id="caller-name" style="color: var(--cyan); font-size: 20px; font-weight: bold; margin: 15px 0;">---</p>
        <div style="display: flex; justify-content: space-around; margin-top: 20px;">
            <button class="btn btn-call" onclick="answerCall()">✅</button>
            <button class="btn btn-end" onclick="rejectCall()">❌</button>
        </div>
    </div>

    <div class="contact-list">
        <div class="contact-card" onclick="document.getElementById('peer-id').value='123456'">💖 Bé Chi (123456)</div>
        <div class="contact-card" onclick="document.getElementById('peer-id').value='789012'">🔥 Admin (789012)</div>
        <div style="font-size: 10px; opacity: 0.6; padding-left: 10px;">ID của bạn: <b id="my-id">...</b></div>
        <input type="number" id="peer-id" placeholder="Nhập ID gọi..." style="background:transparent; border:none; border-bottom:1px solid var(--cyan); color:white; padding:5px; width:120px; outline:none;">
    </div>

    <div id="chat-container"></div>
    <div id="heart-btn" onclick="sendHeart()">❤️</div>

    <div class="video-container">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        
        <div class="controls">
            <button class="btn btn-tool" onclick="toggleMic()">🎙️</button>
            <button class="btn btn-tool" onclick="toggleCam()">📹</button>
            <button class="btn btn-call" onclick="makeCall()">📞</button>
            <button class="btn btn-end" onclick="endCall()">🛑</button>
        </div>
    </div>

    <audio id="ringtone" loop>
        <source src="https://www.soundjay.com/phone/phone-calling-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const myCustomId = Math.floor(100000 + Math.random() * 900000).toString();
        const peer = new Peer(myCustomId, {
            debug: 1,
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'turn:213.163.197.199:443', username: 'tunganh', credential: 'mina2026' }
                ],
                'iceTransportPolicy': 'relay'
            }
        });

        let localStream, incomingCallObj, conn;
        const ringtone = document.getElementById('ringtone');

        navigator.mediaDevices.getUserMedia({ 
            video: { width: 480, height: 360, frameRate: 15 }, audio: true 
        }).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;
        });

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
            document.getElementById('status-bar').innerText = "Online - Sẵn sàng kết nối";
            document.getElementById('status-bar').style.background = "#22c55e";
        });

        // Xử lý cuộc gọi (Video)
        peer.on('call', call => {
            incomingCallObj = call;
            document.getElementById('caller-name').innerText = call.peer;
            document.getElementById('incoming-box').style.display = 'block';
            ringtone.play();
        });

        // Xử lý tin nhắn/lệnh chat (Data Connection)
        peer.on('connection', c => {
            conn = c;
            setupChat();
        });

        function makeCall() {
            const destId = document.getElementById('peer-id').value;
            if(!destId) return;
            
            // Kết nối dữ liệu để chat
            conn = peer.connect(destId);
            setupChat();

            // Kết nối video
            const call = peer.call(destId, localStream);
            handleStream(call);
        }

        function answerCall() {
            ringtone.pause();
            document.getElementById('incoming-box').style.display = 'none';
            incomingCallObj.answer(localStream);
            handleStream(incomingCallObj);
        }

        function handleStream(call) {
            call.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
            });
        }

        // TÍNH NĂNG CHAT & THẢ TIM
        function setupChat() {
            conn.on('data', data => {
                if(data === 'HEART_BOOM') {
                    showHeartEffect();
                } else {
                    addChatMessage(data);
                }
            });
        }

        function sendHeart() {
            if(conn && conn.open) {
                conn.send('HEART_BOOM');
                showHeartEffect();
            }
        }

        function addChatMessage(msg) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerText = msg;
            document.getElementById('chat-container').appendChild(div);
            setTimeout(() => div.remove(), 5000);
        }

        function showHeartEffect() {
            const heart = document.createElement('div');
            heart.className = 'heart-icon';
            heart.innerHTML = '❤️';
            heart.style.left = (Math.random() * 50 + 40) + '%';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        function toggleMic() { localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; }
        function toggleCam() { localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled; }
        function endCall() { location.reload(); }
        function rejectCall() { ringtone.pause(); document.getElementById('incoming-box').style.display = 'none'; }

    </script>
</body>
</html>
