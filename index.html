<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina OTT - HD & Full Screen</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --accent: #ff007b; }
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Fix khung video chiếm trọn phần trên */
        .video-wrapper { 
            position: relative; 
            flex: 1; /* Tự động lấy hết diện tích còn trống */
            width: 100vw; 
            background: #000; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #remote-video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Tràn màn hình không để lại khoảng đen */
        }
        #local-video { 
            position: absolute; top: 15px; right: 15px; width: 110px; height: 150px; 
            border-radius: 12px; border: 2px solid var(--neon); object-fit: cover; z-index: 10;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 20;
        }
        .btn-round { 
            width: 55px; height: 55px; border-radius: 50%; border: none; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px;
        }
        .btn-call { background: #22c55e; color: white; }
        .btn-end { background: #ef4444; color: white; }
        .btn-util { background: rgba(255,255,255,0.25); color: white; backdrop-filter: blur(10px); }

        /* Chat chỉ chiếm 40% màn hình dưới */
        .chat-section { 
            height: 40vh; background: #0a0a0a; display: flex; flex-direction: column; 
            border-top: 1px solid #333;
        }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 10px 14px; border-radius: 18px; max-width: 85%; }
        .msg.me { background: #007aff; align-self: flex-end; }
        .msg.peer { background: #26262b; align-self: flex-start; }

        .input-area { padding: 12px; display: flex; gap: 8px; background: #111; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #222; color: white; outline: none; }
        
        .id-bar { 
            position: absolute; top: 15px; left: 15px; z-index: 20; font-size: 12px; 
            background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--neon); 
        }
    </style>
</head>
<body>

    <div class="id-bar">
        ID: <span id="my-id" style="color:var(--neon); font-weight:bold;">...</span> | 
        <input id="peer-id-input" type="number" placeholder="Nhập ID" style="width: 70px; background: transparent; color: #fff; border: none; outline: none;">
    </div>

    <div class="video-wrapper">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        
        <div class="controls">
            <button class="btn-round btn-util" onclick="toggleMic()" id="mic-btn">🎙️</button>
            <button class="btn-round btn-call" onclick="makeCall()">📞</button>
            <button class="btn-round btn-end" onclick="endCall()">🛑</button>
            <button class="btn-round btn-util" onclick="takeSnapshot()">📸</button>
        </div>
    </div>

    <div class="chat-section">
        <div id="chat-box"></div>
        <div class="input-area">
            <label style="cursor: pointer;">🖼️<input type="file" id="file-input" hidden accept="image/*"></label>
            <input type="text" id="chat-input" placeholder="Nhắn tin...">
            <button onclick="sendMsg()" style="background:none; border:none; color:var(--neon); font-size: 26px;">🚀</button>
        </div>
    </div>

    <script>
        const customId = Math.floor(100000 + Math.random() * 900000).toString();
        const peer = new Peer(customId, {
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { 
                        urls: 'turn:global.relay.metered.ca:443', 
                        username: '6e815724635c858e908b1419', 
                        credential: '/I2NIZRvuJHzUMFI' 
                    }
                ],
                'sdpSemantics': 'unified-plan'
            }
        });

        let localStream, currentCall, dataConn;

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // NÂNG CẤP CHẤT LƯỢNG HÌNH ẢNH (HD)
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                width: { ideal: 1280 }, 
                height: { ideal: 720 },
                frameRate: { ideal: 30 } 
            }, 
            audio: { echoCancellation: true, noiseSuppression: true } 
        }).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;
        });

        peer.on('call', call => {
            currentCall = call;
            call.answer(localStream);
            setupRemoteStream(call);
        });

        peer.on('connection', conn => {
            dataConn = conn;
            conn.on('data', data => {
                if(data.type === 'text') appendMsg('peer', data.content);
                if(data.type === 'img') appendImg('peer', data.content);
            });
        });

        function makeCall() {
            const id = document.getElementById('peer-id-input').value;
            if(!id) return;
            dataConn = peer.connect(id);
            currentCall = peer.call(id, localStream);
            setupRemoteStream(currentCall);
        }

        function setupRemoteStream(call) {
            call.on('stream', rs => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = rs;
                rv.play().then(() => {
                    setTimeout(() => { rv.muted = false; }, 1000);
                }).catch(() => {
                    rv.muted = true;
                    rv.play();
                });
            });
        }

        function sendMsg() {
            const txt = document.getElementById('chat-input').value;
            if(!txt || !dataConn) return;
            dataConn.send({type: 'text', content: txt});
            appendMsg('me', txt);
            document.getElementById('chat-input').value = '';
        }

        function appendMsg(sender, text) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            const box = document.getElementById('chat-box');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                dataConn.send({type: 'img', content: reader.result});
                appendImg('me', reader.result);
            };
            reader.readAsDataURL(file);
        };

        function appendImg(sender, src) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = `<img src="${src}" style="max-width:100%; border-radius:10px;">`;
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        function toggleMic() {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('mic-btn').innerText = track.enabled ? "🎙️" : "🔇";
        }

        function endCall() { location.reload(); }

        function takeSnapshot() {
            const video = document.getElementById('remote-video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const link = document.createElement('a');
            link.download = `photo.png`; link.href = canvas.toDataURL(); link.click();
        }
    </script>
</body>
</html>
