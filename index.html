<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina OTT - 4G Connection Fixed</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* Video lồng nhau */
        .video-wrapper { position: relative; width: 100vw; height: 50vh; background: #111; border-bottom: 1px solid #333; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #local-video { 
            position: absolute; top: 10px; right: 10px; width: 95px; height: 130px; 
            border-radius: 12px; border: 2px solid var(--neon); object-fit: cover; z-index: 10;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        /* Thanh điều khiển */
        .controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 20;
        }
        .btn-round { 
            width: 48px; height: 48px; border-radius: 50%; border: none; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px;
            transition: 0.3s;
        }
        .btn-call { background: #22c55e; color: white; }
        .btn-end { background: #ef4444; color: white; }
        .btn-util { background: rgba(255,255,255,0.2); color: white; backdrop-filter: blur(10px); }

        /* Chat OTT */
        .chat-section { 
            height: 50vh; background: #0a0a0a; display: flex; flex-direction: column;
        }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 10px 14px; border-radius: 18px; max-width: 80%; line-height: 1.4; }
        .msg.me { background: #007aff; align-self: flex-end; }
        .msg.peer { background: #26262b; align-self: flex-start; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        .input-area { padding: 10px; display: flex; gap: 8px; background: #111; border-top: 1px solid #222; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #222; color: white; outline: none; }
        
        .id-bar { 
            position: absolute; top: 10px; left: 10px; z-index: 20; font-size: 11px; 
            background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--neon); 
        }
    </style>
</head>
<body>

    <div class="id-bar">
        MÃ CỦA BẠN: <span id="my-id" style="color:var(--neon); font-weight:bold;">...</span> | 
        <input id="peer-id-input" type="number" placeholder="Nhập mã gọi..." style="width: 85px; background: transparent; color: #ff007b; border: none; outline: none; font-weight: bold;">
    </div>

    <div class="video-wrapper">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        
        <div class="controls">
            <button class="btn-round btn-util" onclick="toggleMic()" id="mic-btn">🎙️</button>
            <button class="btn-round btn-call" onclick="makeCall()">📞</button>
            <button class="btn-round btn-end" onclick="endCall()">🛑</button>
            <button class="btn-round btn-util" onclick="takeSnapshot()">📸</button>
        </div>
    </div>

    <div class="chat-section">
        <div id="chat-box"></div>
        <div class="input-area">
            <label style="cursor: pointer; padding: 5px;">🖼️<input type="file" id="file-input" hidden accept="image/*"></label>
            <input type="text" id="chat-input" placeholder="Nhập tin nhắn...">
            <button onclick="sendMsg()" style="background:none; border:none; color:var(--neon); font-size: 24px;">🚀</button>
        </div>
    </div>

    <script>
        const customId = Math.floor(100000 + Math.random() * 900000).toString();
        
        // CẤU HÌNH TURN SERVER RIÊNG CỦA ANH TÙNG ANH
        const peer = new Peer(customId, {
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { 
                        urls: 'turn:global.relay.metered.ca:443', 
                        username: '6e815724635c858e908b1419', 
                        credential: '/I2NIZRvuJHzUMFI' 
                    },
                    { 
                        urls: 'turn:global.relay.metered.ca:80', 
                        username: '6e815724635c858e908b1419', 
                        credential: '/I2NIZRvuJHzUMFI' 
                    }
                ],
                'sdpSemantics': 'unified-plan'
            }
        });

        let localStream, currentCall, dataConn;

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // Khởi tạo Camera ngay khi mở web
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;
        }).catch(err => alert("Vui lòng cấp quyền Camera/Mic để gọi!"));

        // Nhận cuộc gọi
        peer.on('call', call => {
            if(confirm("Có cuộc gọi đến từ " + call.peer)) {
                currentCall = call;
                call.answer(localStream);
                setupRemoteStream(call);
            }
        });

        // Nhận kết nối chat
        peer.on('connection', conn => {
            dataConn = conn;
            setupDataListeners();
        });

        function makeCall() {
            const id = document.getElementById('peer-id-input').value;
            if(!id) return alert("Vui lòng nhập mã đối phương!");

            dataConn = peer.connect(id);
            setupDataListeners();

            currentCall = peer.call(id, localStream);
            setupRemoteStream(currentCall);
        }

        function setupRemoteStream(call) {
            call.on('stream', rs => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = rs;
                // Ép video chạy và xử lý lỗi tự động phát trên Mobile
                rv.play().catch(() => {
                    rv.muted = true;
                    rv.play();
                });
            });
        }

        function setupDataListeners() {
            dataConn.on('data', data => {
                if(data.type === 'text') appendMsg('peer', data.content);
                if(data.type === 'img') appendImg('peer', data.content);
            });
        }

        function sendMsg() {
            const txt = document.getElementById('chat-input').value;
            if(!txt || !dataConn) return;
            dataConn.send({type: 'text', content: txt});
            appendMsg('me', txt);
            document.getElementById('chat-input').value = '';
        }

        function appendMsg(sender, text) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            const box = document.getElementById('chat-box');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                dataConn.send({type: 'img', content: reader.result});
                appendImg('me', reader.result);
            };
            reader.readAsDataURL(file);
        };

        function appendImg(sender, src) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = `<img src="${src}" style="max-width:100%; border-radius:10px;">`;
            const box = document.getElementById('chat-box');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function toggleMic() {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('mic-btn').innerText = track.enabled ? "🎙️" : "🔇";
        }

        function endCall() { 
            if(currentCall) currentCall.close();
            location.reload(); 
        }

        function takeSnapshot() {
            const video = document.getElementById('remote-video');
            if(!video.srcObject) return alert("Không có hình ảnh để chụp!");
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const link = document.createElement('a');
            link.download = `mina-capture-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
