<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina OTT - Twilio Hardcore Fix</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #status-bar { background: var(--warning); color: #000; text-align: center; font-size: 13px; font-weight: bold; padding: 8px 0; z-index: 100; transition: 0.3s; }
        .video-wrapper { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; background: #111; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #local-video { position: absolute; top: 50px; right: 15px; width: 110px; height: 150px; border-radius: 12px; border: 2px solid var(--neon); object-fit: cover; z-index: 10; background: #222; }
        #incoming-call-box { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 2px solid var(--neon); padding: 30px;
            border-radius: 20px; text-align: center; z-index: 1000; display: none;
            box-shadow: 0 0 30px var(--neon); width: 85%;
        }
        .controls { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 20; }
        .btn-round { width: 60px; height: 60px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-call { background: var(--success); color: white; }
        .btn-end { background: var(--danger); color: white; }
        .btn-util { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); color: white; }
        .id-bar { position: absolute; top: 50px; left: 15px; z-index: 20; font-size: 11px; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--neon); }
    </style>
</head>
<body>

    <div id="status-bar">Đang khởi tạo hệ thống...</div>

    <div id="incoming-call-box">
        <h3 style="margin:0">Cuộc gọi đến...</h3>
        <p id="caller-id" style="color: var(--neon); font-size: 20px; font-weight: bold;">---</p>
        <div style="display: flex; justify-content: space-around; margin-top: 20px;">
            <button class="btn-round btn-call" onclick="answerCall()">📞</button>
            <button class="btn-round btn-end" onclick="rejectCall()">🛑</button>
        </div>
    </div>

    <div class="id-bar">
        ID: <span id="my-id" style="color:var(--neon); font-weight:bold;">...</span> | 
        <input id="peer-id-input" type="number" placeholder="ID Bạn" style="width: 60px; background: transparent; color: white; border: none; outline: none;">
    </div>

    <div class="video-wrapper">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        
        <div class="controls">
            <button class="btn-round btn-util" onclick="toggleMic()" id="mic-btn">🎙️</button>
            <button class="btn-round btn-util" onclick="toggleCam()" id="cam-btn">📹</button>
            <button class="btn-round btn-call" onclick="makeCall()">📞</button>
            <button class="btn-round btn-end" onclick="endCall()">🛑</button>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status-bar');
        const callBox = document.getElementById('incoming-call-box');
        const customId = Math.floor(100000 + Math.random() * 900000).toString();
        
        function updateStatus(text, type) {
            statusEl.innerText = text;
            statusEl.style.background = type === 'success' ? 'var(--success)' : (type === 'error' ? 'var(--danger)' : 'var(--warning)');
        }

        // CẤU HÌNH ÉP DÙNG RELAY ĐỂ VƯỢT 4G
        const peer = new Peer(customId, {
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    {
                        urls: [
                            'turn:global.turn.twilio.com:3478?transport=udp',
                            'turn:global.turn.twilio.com:3478?transport=tcp',
                            'turn:global.turn.twilio.com:443?transport=tcp'
                        ],
                        username: 'ACd53b46bd95dd9917d2a7a4bef1de5648',
                        credential: '9daacbcd407e9ebf3fe90536be2a4d33'
                    }
                ],
                'iceTransportPolicy': 'relay', // ÉP BUỘC CHỈ DÙNG TURN SERVER (CỰC QUAN TRỌNG CHO 4G)
                'iceCandidatePoolSize': 10
            }
        });

        let localStream, incomingCall;

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
            updateStatus('Đã kết nối Twilio (Relay Mode)', 'success');
        });

        // Hạ độ phân giải để đảm bảo hình lên được
        navigator.mediaDevices.getUserMedia({ 
            video: { width: 480, height: 360, frameRate: 15 }, 
            audio: true 
        }).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;
        });

        peer.on('call', call => {
            incomingCall = call;
            document.getElementById('caller-id').innerText = call.peer;
            callBox.style.display = 'block';
            updateStatus('ĐANG ĐỔ CHUÔNG...', 'warning');
        });

        function answerCall() {
            callBox.style.display = 'none';
            incomingCall.answer(localStream);
            
            incomingCall.on('stream', rs => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = rs;
                updateStatus('Đang đồng bộ luồng video...', 'warning');
                
                rv.onloadedmetadata = () => {
                    rv.play().then(() => {
                        updateStatus('Đã đàm thoại thành công', 'success');
                        rv.muted = false;
                    }).catch(e => {
                        updateStatus('Vui lòng chạm vào màn hình!', 'warning');
                        rv.muted = true; rv.play();
                    });
                };
            });
        }

        function makeCall() {
            const id = document.getElementById('peer-id-input').value;
            if(!id) return alert("Nhập ID!");
            updateStatus('Đang gọi ' + id + '...', 'warning');
            
            const call = peer.call(id, localStream);
            call.on('stream', rs => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = rs;
                updateStatus('Đã kết nối hình ảnh!', 'success');
            });
        }

        function toggleCam() { localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled; }
        function toggleMic() { localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; }
        function endCall() { location.reload(); }
        function rejectCall() { location.reload(); }
    </script>
</body>
</html>
