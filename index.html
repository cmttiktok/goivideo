<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina OTT - Final Connection Fix</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #status-bar { background: var(--warning); color: #000; text-align: center; font-size: 12px; font-weight: bold; padding: 6px 0; z-index: 100; }

        .video-wrapper { position: relative; flex: 1; width: 100vw; background: #111; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #local-video { position: absolute; top: 15px; right: 15px; width: 100px; height: 140px; border-radius: 12px; border: 2px solid var(--neon); object-fit: cover; z-index: 10; background: #222; }

        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 20; }
        .btn-round { width: 50px; height: 50px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-call { background: var(--success); color: white; }
        .btn-end { background: var(--danger); color: white; }
        .btn-util { background: rgba(255,255,255,0.2); color: white; backdrop-filter: blur(10px); }
        .btn-off { background: #555 !important; color: #ff4d4d !important; }

        .chat-section { height: 35vh; background: #0a0a0a; display: flex; flex-direction: column; border-top: 1px solid #333; }
        #chat-box { flex: 1; overflow-y: auto; padding: 12px; font-size: 14px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 8px 14px; border-radius: 15px; max-width: 85%; }
        .msg.me { background: #007aff; align-self: flex-end; }
        .msg.peer { background: #26262b; align-self: flex-start; }

        .input-area { padding: 10px; display: flex; gap: 8px; background: #111; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px 15px; border-radius: 20px; border: none; background: #222; color: white; outline: none; }
        
        .id-bar { position: absolute; top: 15px; left: 15px; z-index: 20; font-size: 11px; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--neon); }
    </style>
</head>
<body>

    <div id="status-bar">Đang khởi tạo Camera...</div>

    <div class="id-bar">
        ID: <span id="my-id" style="color:var(--neon); font-weight:bold;">...</span> | 
        <input id="peer-id-input" type="number" placeholder="Mã bạn" style="width: 65px; background: transparent; color: white; border: none; outline: none;">
    </div>

    <div class="video-wrapper">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        
        <div class="controls">
            <button class="btn-round btn-util" onclick="toggleMic()" id="mic-btn">🎙️</button>
            <button class="btn-round btn-util" onclick="toggleCam()" id="cam-btn">📹</button>
            <button class="btn-round btn-call" onclick="makeCall()">📞</button>
            <button class="btn-round btn-end" onclick="endCall()">🛑</button>
        </div>
    </div>

    <div class="chat-section">
        <div id="chat-box"></div>
        <div class="input-area">
            <label style="cursor: pointer;">🖼️<input type="file" id="file-input" hidden accept="image/*"></label>
            <input type="text" id="chat-input" placeholder="Nhắn tin...">
            <button onclick="sendMsg()" style="background:none; border:none; color:var(--neon); font-size: 22px;">🚀</button>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status-bar');
        const customId = Math.floor(100000 + Math.random() * 900000).toString();
        
        function updateStatus(text, type) {
            statusEl.innerText = text;
            if (type === 'success') statusEl.style.background = 'var(--success)';
            else if (type === 'error') statusEl.style.background = 'var(--danger)';
            else statusEl.style.background = 'var(--warning)';
        }

        // KẾT HỢP CẢ 2 SERVER ĐỂ TỐI ƯU KẾT NỐI
        const peer = new Peer(customId, {
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    // Dùng mã riêng của anh Tùng Anh để "mồi" kết nối cực mạnh
                    { 
                        urls: 'turn:global.relay.metered.ca:443', 
                        username: '6e815724635c858e908b1419', 
                        credential: '/I2NIZRvuJHzUMFI' 
                    },
                    // Dự phòng bằng OpenRelay
                    { 
                        urls: 'turn:openrelay.metered.ca:443', 
                        username: 'openrelayproject', 
                        credential: 'openrelayproject' 
                    }
                ],
                'iceCandidatePoolSize': 10
            }
        });

        let localStream, currentCall, dataConn;

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
            updateStatus('Sẵn sàng kết nối (Online)', 'success');
        });

        // Tự động yêu cầu quyền Cam/Mic ngay lập tức
        navigator.mediaDevices.getUserMedia({ 
            video: { width: 640, height: 480 }, audio: true 
        }).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;
            updateStatus('Camera đã bật - Sẵn sàng', 'success');
        }).catch(() => updateStatus('Lỗi: Hãy cấp quyền Camera/Micro!', 'error'));

        // Xử lý khi có cuộc gọi đến
        peer.on('call', call => {
            updateStatus('Đang có cuộc gọi đến...', 'warning');
            currentCall = call;
            call.answer(localStream);
            setupRemoteStream(call);
        });

        function makeCall() {
            const id = document.getElementById('peer-id-input').value;
            if(!id) return alert("Nhập mã đối phương!");
            updateStatus('Đang gọi: ' + id + '...', 'warning');
            dataConn = peer.connect(id);
            currentCall = peer.call(id, localStream);
            setupRemoteStream(currentCall);
        }

        function setupRemoteStream(call) {
            call.on('stream', rs => {
                updateStatus('Đang đồng bộ hình ảnh...', 'warning');
                const rv = document.getElementById('remote-video');
                rv.srcObject = rs;
                
                // Fix lỗi đứng hình: Ép video play liên tục
                const playPromise = rv.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => {
                        updateStatus('Đã kết nối thành công!', 'success');
                        setTimeout(() => { rv.muted = false; }, 800);
                    }).catch(e => {
                        rv.muted = true;
                        rv.play();
                    });
                }
            });
        }

        // Chat và các nút điều khiển giữ nguyên
        peer.on('connection', conn => {
            dataConn = conn;
            conn.on('data', data => {
                if(data.type === 'text') appendMsg('peer', data.content);
                if(data.type === 'img') appendImg('peer', data.content);
            });
        });

        function toggleCam() {
            const track = localStream.getVideoTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('cam-btn').innerText = track.enabled ? "📹" : "🚫";
            document.getElementById('cam-btn').classList.toggle('btn-off', !track.enabled);
        }

        function toggleMic() {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('mic-btn').innerText = track.enabled ? "🎙️" : "🔇";
            document.getElementById('mic-btn').classList.toggle('btn-off', !track.enabled);
        }

        function sendMsg() {
            const txt = document.getElementById('chat-input').value;
            if(!txt || !dataConn) return;
            dataConn.send({type: 'text', content: txt});
            appendMsg('me', txt);
            document.getElementById('chat-input').value = '';
        }

        function appendMsg(sender, text) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            const box = document.getElementById('chat-box');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                if(dataConn) dataConn.send({type: 'img', content: reader.result});
                appendImg('me', reader.result);
            };
            reader.readAsDataURL(file);
        };

        function appendImg(sender, src) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = `<img src="${src}" style="max-width:100%; border-radius:10px;">`;
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        function endCall() { location.reload(); }
    </script>
</body>
</html>
