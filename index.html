<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ứng dụng làm mới đường truyền Viettel Net</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --zalo-blue: #0068ff; --pink: #ff85a2; --bg: #f0f2f5; --danger: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; height: 100vh; overflow: hidden; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--zalo-blue); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .login-card input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; text-align: center; font-size: 18px; }
        
        .main-container { position: relative; width: 100%; height: 100vh; display: none; }
        
        /* Video của người kia - Toàn màn hình */
        #remote-video { width: 100%; height: 100%; object-fit: cover; background: #222; }
        
        /* Video của mình - Khung nhỏ góc phải (ĐÃ FIX LỖI HIỂN THỊ) */
        #local-video { 
            position: absolute; top: 100px; right: 20px; 
            width: 110px; height: 160px; 
            border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.8); 
            object-fit: cover; z-index: 500; background: #000;
            transform: scaleX(-1); /* Chống ngược đầu */
        }

        .zalo-header { position: absolute; top: 0; width: 100%; padding: 45px 15px 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); display: flex; align-items: center; z-index: 100; }
        
        #chat-box { position: absolute; bottom: 180px; left: 15px; right: 15px; max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; pointer-events: none; z-index: 200; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 15px; pointer-events: auto; }
        .msg.partner { background: white; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.me { background: var(--zalo-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        .input-bar { position: absolute; bottom: 100px; left: 15px; right: 15px; display: flex; align-items: center; background: rgba(255,255,255,0.2); backdrop-filter: blur(15px); padding: 5px 15px; border-radius: 25px; z-index: 300; border: 1px solid rgba(255,255,255,0.3); }
        #chat-input { flex: 1; background: none; border: none; padding: 10px; color: white; outline: none; }

        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 25px; z-index: 400; }
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 22px; background: rgba(255,255,255,0.2); color: white; backdrop-filter: blur(10px); cursor: pointer; }
        .btn-call { background: #4cd964; width: 65px; height: 65px; font-size: 28px; }
        .btn-hangup { background: var(--danger); width: 65px; height: 65px; font-size: 28px; }
        .btn-off { background: var(--danger) !important; }

        #call-overlay { position: fixed; inset: 0; background: #1e3c72; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .avatar-lg { width: 120px; height: 120px; background: var(--pink); border-radius: 50%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 50px; }
    
        .stream-notice { position: absolute; font-size: 11px; background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 5px; z-index: 600; color: #fff; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h3>Hệ thống làm mới đường truyền Viettel</h3>
            <input type="number" id="user-id-input" placeholder="Nhập Mã KH">
            <button onclick="confirmIdentity()" style="width:100%; padding:12px; background:var(--zalo-blue); color:white; border:none; border-radius:10px; font-weight:bold">KIỂM TRA</button>
        </div>
    </div>

    <div class="main-container" id="app-ui">
        <div class="zalo-header">
            <div style="font-size:24px; margin-right:15px">❮</div>
            <div>
                <b id="partner-name-header">...</b>
                <div id="status-text" style="font-size: 12px; opacity: 0.8;">Đang chờ kết nối...</div>
            </div>
        </div>

        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        
        <div id="remote-notice" class="stream-notice" style="bottom: 180px; left: 15px; display: none;"></div>
        <div id="local-notice" class="stream-notice" style="top: 270px; right: 20px; display: none;"></div>

        <div id="chat-box"></div>

        <div class="input-bar">
            <input type="text" id="chat-input" placeholder="Tin nhắn..." onkeypress="if(event.key==='Enter') sendMsg()">
            <span onclick="sendMsg()" style="font-size:20px; cursor:pointer">🚀</span>
        </div>

        <div class="controls">
            <button class="circle-btn" id="mic-btn" onclick="toggleMic()">🎙️</button>
            <button class="circle-btn btn-call" id="call-btn" onclick="makeCall()">📞</button>
            <button class="circle-btn" id="cam-btn" onclick="toggleCam()">📹</button>
            <button class="circle-btn btn-hangup" id="hangup-btn" onclick="hangUp()" style="display:none">🛑</button>
        </div>
    </div>

    <div id="call-overlay">
        <div class="avatar-lg">🌸</div>
        <h2 id="caller-name">... đang gọi</h2>
        <div style="display:flex; gap:60px; margin-top:50px">
            <div onclick="answerCall()" style="text-align:center"><div class="circle-btn btn-call">📞</div><p>NHẬN</p></div>
            <div onclick="rejectCall()" style="text-align:center"><div class="circle-btn btn-hangup">✖</div><p>TỪ CHỐI</p></div>
        </div>
    </div>

    <audio id="ringtone" loop><source src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>

    <script>
        const ID_CHI = "mina_user_1"; const ID_ANH = "mina_user_2";
        let myId, partnerId, peer, localStream, currentCall, dataConn;
        let isPartnerOnline = false, lastOnlineTime = 0;
        let isMicOn = true, isCamOn = true;
        const ringtone = document.getElementById('ringtone');

        function confirmIdentity() {
            const input = document.getElementById('user-id-input').value;
            if(input === "1") {
                myId = ID_CHI; partnerId = ID_ANH;
                document.getElementById('partner-name-header').innerText = "Bảo Bối ❤️";
            } else if(input === "2") {
                myId = ID_ANH; partnerId = ID_CHI;
                document.getElementById('partner-name-header').innerText = "Bé Chi 🌸";
            } else { alert("Mã KH Sai!"); return; }
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-ui').style.display = 'block';
            startSystem();
        }

        function startSystem() {
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                localStream = stream;
                document.getElementById('local-video').srcObject = stream;
                peer = new Peer(myId, {
                    config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'turn:213.163.197.199:443', username: 'tunganh', credential: 'mina2026' }] }
                });
                peer.on('open', () => setInterval(checkPartnerStatus, 3000));
                peer.on('call', call => {
                    currentCall = call;
                    document.getElementById('call-overlay').style.display = 'flex';
                    ringtone.play();
                });
                peer.on('connection', conn => { dataConn = conn; setupDataHandlers(); });
            });
        }

        function checkPartnerStatus() {
            if (currentCall) return;
            const conn = peer.connect(partnerId, { reliable: false });
            conn.on('open', () => { lastOnlineTime = Date.now(); updateUIStatus(true); conn.close(); });
            setTimeout(() => { if (Date.now() - lastOnlineTime > 7000) updateUIStatus(false); }, 3500);
        }

        function updateUIStatus(online) {
            const el = document.getElementById('status-text');
            isPartnerOnline = online;
            el.innerText = online ? "Đang trực tuyến ❤️" : "Đang chờ người ấy kết nối...";
            el.style.color = online ? "#4cd964" : "rgba(255,255,255,0.8)";
        }

        function makeCall() {
            if (!isPartnerOnline) { alert("Người ấy đang offline!"); return; }
            const call = peer.call(partnerId, localStream);
            currentCall = call;
            dataConn = peer.connect(partnerId);
            setupDataHandlers();
            call.on('stream', stream => { document.getElementById('remote-video').srcObject = stream; onCallConnected(); });
        }

        function answerCall() {
            ringtone.pause();
            document.getElementById('call-overlay').style.display = 'none';
            currentCall.answer(localStream);
            dataConn = peer.connect(currentCall.peer);
            setupDataHandlers();
            currentCall.on('stream', stream => { document.getElementById('remote-video').srcObject = stream; onCallConnected(); });
        }

        function onCallConnected() {
            document.getElementById('call-btn').style.display = 'none';
            document.getElementById('hangup-btn').style.display = 'flex';
            document.getElementById('status-text').innerText = "Cuộc gọi đang diễn ra";
        }

        function setupDataHandlers() {
            dataConn.on('data', data => {
                if(data.type === 'CHAT') appendMsg(data.text, 'partner');
                if(data.type === 'END') location.reload();
                if(data.type === 'STATUS') {
                    const partnerName = (myId === ID_CHI) ? "Bảo Bối" : "Bé Chi";
                    const notice = document.getElementById('remote-notice');
                    if(data.device === 'mic') notice.innerText = data.on ? "" : `${partnerName} đã tắt Mic`;
                    else notice.innerText = data.on ? "" : `${partnerName} đã tắt Camera`;
                    notice.style.display = notice.innerText ? "block" : "none";
                }
            });
        }

        function toggleMic() {
            isMicOn = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
            const btn = document.getElementById('mic-btn');
            const notice = document.getElementById('local-notice');
            btn.innerText = isMicOn ? "🎙️" : "🔇";
            btn.classList.toggle('btn-off', !isMicOn);
            notice.innerText = isMicOn ? "" : "Bạn đã tắt Mic";
            notice.style.display = notice.innerText ? "block" : "none";
            if(dataConn) dataConn.send({type: 'STATUS', device: 'mic', on: isMicOn});
        }

        function toggleCam() {
            isCamOn = localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled;
            const btn = document.getElementById('cam-btn');
            const notice = document.getElementById('local-notice');
            btn.innerText = isCamOn ? "📹" : "🚫";
            btn.classList.toggle('btn-off', !isCamOn);
            notice.innerText = isCamOn ? "" : "Bạn đã tắt Camera";
            notice.style.display = notice.innerText ? "block" : "none";
            if(dataConn) dataConn.send({type: 'STATUS', device: 'cam', on: isCamOn});
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(input.value.trim() && dataConn) {
                dataConn.send({ type: 'CHAT', text: input.value });
                appendMsg(input.value, 'me');
                input.value = '';
            }
        }

        function appendMsg(text, type) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${type}`; div.innerText = text;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }

        function hangUp() { if(dataConn) dataConn.send({type:'END'}); location.reload(); }
        function rejectCall() { ringtone.pause(); document.getElementById('call-overlay').style.display = 'none'; }
    </script>
</body>
</html>
