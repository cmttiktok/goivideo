<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina & Tùng Anh - Kết Nối Riêng Tư</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --zalo-blue: #0068ff; --pink: #ff85a2; --glass: rgba(255, 255, 255, 0.2); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        
        #status-bar { position: absolute; top: 0; width: 100%; padding: 10px; text-align: center; background: rgba(0,0,0,0.6); font-size: 14px; z-index: 100; color: var(--pink); font-weight: bold; }

        .video-wrapper { position: relative; width: 100%; height: 100vh; background: #1a1a1a; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 60px; right: 20px; width: 100px; height: 140px; border-radius: 12px; border: 1.5px solid #fff; object-fit: cover; z-index: 10; }

        /* Khung Chat */
        #chat-container { position: absolute; bottom: 160px; left: 10px; right: 10px; max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; pointer-events: none; z-index: 30; }
        .msg { background: var(--glass); backdrop-filter: blur(10px); padding: 8px 14px; border-radius: 18px; max-width: 80%; font-size: 14px; align-self: flex-start; pointer-events: auto; animation: fadeIn 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .msg.me { align-self: flex-end; background: var(--zalo-blue); border: none; }

        /* Nhập tin nhắn */
        .input-area { position: absolute; bottom: 100px; left: 15px; right: 15px; display: flex; gap: 10px; z-index: 40; }
        #chat-input { flex: 1; background: rgba(255,255,255,0.15); border: 1px solid var(--glass); border-radius: 25px; padding: 12px 20px; color: white; outline: none; backdrop-filter: blur(15px); }

        /* Bộ điều khiển */
        .controls { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; gap: 30px; z-index: 50; }
        .icon-btn { width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; background: rgba(255,255,255,0.2); color: white; transition: 0.3s; }
        .btn-end { background: #ff3b30; }
        .btn-main-call { background: #4cd964; width: 65px; height: 65px; font-size: 28px; box-shadow: 0 0 20px rgba(76, 217, 100, 0.5); }

        /* Màn hình chờ & Cuộc gọi đến */
        #overlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; }
        #incoming-ui { position: fixed; inset: 0; background: linear-gradient(to bottom, #1e3c72, #2a5298); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 900; }
        .avatar-circle { width: 110px; height: 110px; background: var(--pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; margin-bottom: 25px; box-shadow: 0 0 30px rgba(255,133,162,0.4); }
    </style>
</head>
<body>

    <div id="status-bar">Đang khởi tạo kết nối riêng tư...</div>

    <div id="overlay">
        <div class="avatar-circle">💖</div>
        <h2 id="welcome-text">Mina OTT <br> Anh Tùng Anh & Bé Chi</h2>
        <button onclick="initApp()" style="background:var(--zalo-blue); color:white; border:none; padding:15px 45px; border-radius:30px; font-weight:bold; margin-top:20px; cursor:pointer;">BẮT ĐẦU KẾT NỐI</button>
    </div>

    <div id="incoming-ui">
        <div class="avatar-circle" id="incoming-avatar">🌸</div>
        <h2 id="caller-name-ui">ĐANG GỌI CHO BẠN...</h2>
        <div style="display: flex; gap: 50px; margin-top: 60px;">
            <div onclick="answerCall()" style="cursor:pointer; text-align:center;">
                <div class="icon-btn btn-main-call">📞</div>
                <p>TRẢ LỜI</p>
            </div>
            <div onclick="rejectCall()" style="cursor:pointer; text-align:center;">
                <div class="icon-btn btn-end">✖</div>
                <p>TỪ CHỐI</p>
            </div>
        </div>
    </div>

    <div class="video-wrapper">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        
        <div id="chat-container"></div>

        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Nhắn tin cho người ấy..." onkeypress="handleChat(event)">
            <button onclick="sendChat()" style="background:none; border:none; font-size: 24px; cursor:pointer;">🚀</button>
        </div>

        <div class="controls">
            <button class="icon-btn" id="mic-btn" onclick="toggleMic()">🎙️</button>
            <button class="icon-btn btn-main-call" id="call-trigger-btn" onclick="startCallProcess()">📞</button>
            <button class="icon-btn" id="cam-btn" onclick="toggleCam()">📹</button>
            <button class="icon-btn btn-end" onclick="endCall()">🛑</button>
        </div>
    </div>

    <audio id="ringtone" loop preload="auto"><source src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>

    <script>
        const ANH = "tunganh_0559898055";
        const CHI = "bechi_nangu";
        const isAdmin = window.location.hash === '#ad';
        const MY_ID = isAdmin ? ANH : CHI;
        const PARTNER_ID = isAdmin ? CHI : ANH;
        
        let peer, localStream, dataConn, currentCall;
        const ringtone = document.getElementById('ringtone');

        function initApp() {
            document.getElementById('overlay').style.display = 'none';
            ringtone.play().then(() => ringtone.pause());
            
            navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
                localStream = stream;
                document.getElementById('local-video').srcObject = stream;
                startPeer();
            }).catch(e => alert("Vui lòng cho phép quyền Camera/Mic để gọi"));
        }

        function startPeer() {
            peer = new Peer(MY_ID, {
                debug: 1,
                config: {
                    'iceServers': [{ urls: 'stun:stun.l.google.com:19302' },
                                   { urls: 'turn:213.163.197.199:443', username: 'tunganh', credential: 'mina2026' }]
                }
            });

            peer.on('open', () => {
                document.getElementById('status-bar').innerText = isAdmin ? "Đang trực Hotline 🌸" : "Đã sẵn sàng gọi cho Anh ❤️";
                // Nếu là Admin thì ẩn nút gọi đi, đợi khách gọi đến
                if(isAdmin) document.getElementById('call-trigger-btn').style.visibility = 'hidden';
                setInterval(checkOnline, 4000);
            });

            peer.on('call', call => {
                currentCall = call;
                document.getElementById('incoming-ui').style.display = 'flex';
                document.getElementById('caller-name-ui').innerText = isAdmin ? "Bé Chi đang gọi..." : "Anh Tùng Anh đang gọi...";
                ringtone.play();
            });

            peer.on('connection', conn => {
                dataConn = conn;
                setupDataHandlers();
            });
        }

        function checkOnline() {
            const conn = peer.connect(PARTNER_ID);
            conn.on('open', () => {
                document.getElementById('status-bar').innerText = "Người ấy đang Online ❤️";
                conn.close();
            });
        }

        function startCallProcess() {
            document.getElementById('status-bar').innerText = "Đang kết nối...";
            const call = peer.call(PARTNER_ID, localStream);
            currentCall = call;
            dataConn = peer.connect(PARTNER_ID);
            setupDataHandlers();
            call.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
                document.getElementById('status-bar').innerText = "Đang trong cuộc gọi ❤️";
            });
        }

        function answerCall() {
            ringtone.pause();
            document.getElementById('incoming-ui').style.display = 'none';
            currentCall.answer(localStream);
            dataConn = peer.connect(currentCall.peer);
            setupDataHandlers();
            currentCall.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
            });
        }

        function setupDataHandlers() {
            dataConn.on('data', data => {
                if (data.type === 'CHAT') appendMsg(data.text, false);
                if (data.type === 'END') showEndScreen(data.sender);
            });
        }

        function handleChat(e) { if(e.key === 'Enter') sendChat(); }
        function sendChat() {
            const input = document.getElementById('chat-input');
            if (input.value.trim() && dataConn && dataConn.open) {
                dataConn.send({ type: 'CHAT', text: input.value });
                appendMsg(input.value, true);
                input.value = '';
            }
        }

        function appendMsg(text, isMe) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'me' : ''}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            if(!isMe) setTimeout(() => div.style.opacity = '0.5', 8000);
        }

        function endCall() {
            const name = isAdmin ? "Anh Tùng Anh" : "Bé Chi";
            if(dataConn) dataConn.send({ type: 'END', sender: name });
            showEndScreen("Bạn");
        }

        function showEndScreen(who) {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('welcome-text').innerHTML = `<span style="color:var(--pink); font-size:20px;">${who} đã kết thúc cuộc gọi</span>`;
            setTimeout(() => location.reload(), 3000);
        }

        function toggleMic() { 
            const active = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
            document.getElementById('mic-btn').innerText = active ? "🎙️" : "🔇";
        }
        function toggleCam() { 
            const active = localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled;
            document.getElementById('cam-btn').innerText = active ? "📹" : "🚫";
        }
        function rejectCall() { ringtone.pause(); document.getElementById('incoming-ui').style.display = 'none'; }
    </script>
</body>
</html>
