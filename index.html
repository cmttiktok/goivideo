<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina Video Call</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --glass: rgba(255, 255, 255, 0.1); }
        body {
            margin: 0; background: #0a0a0a; color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .app-container {
            width: 95%; max-width: 500px; background: var(--glass);
            backdrop-filter: blur(20px); border-radius: 25px;
            padding: 20px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
        h2 { color: var(--neon); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .id-badge {
            background: rgba(0, 242, 255, 0.1); padding: 10px;
            border-radius: 12px; border: 1px dashed var(--neon);
            margin: 15px 0; display: inline-block;
        }
        #my-id { font-size: 24px; font-weight: bold; color: var(--neon); letter-spacing: 3px; }
        
        .video-grid { display: grid; gap: 15px; margin: 20px 0; }
        video {
            width: 100%; border-radius: 15px; background: #000;
            object-fit: cover; border: 1px solid rgba(255,255,255,0.2);
            height: 200px; /* Chiều cao cố định cho mobile */
        }
        #remote-video { border: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon); height: 250px; }

        .input-group { display: flex; flex-direction: column; gap: 10px; }
        input {
            padding: 15px; border-radius: 12px; border: none;
            background: rgba(255,255,255,0.05); color: white;
            font-size: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.2);
        }
        button {
            padding: 15px; border-radius: 12px; border: none;
            background: var(--neon); color: #000; font-weight: bold;
            font-size: 16px; cursor: pointer; transition: 0.3s;
        }
        button:active { transform: scale(0.95); opacity: 0.8; }
        .footer-text { font-size: 12px; opacity: 0.5; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>MINA CALL</h2>
        
        <div class="id-badge">
            <div style="font-size: 12px; opacity: 0.8;">MÃ CỦA BẠN</div>
            <div id="my-id">...</div>
        </div>
        
        <div class="input-group">
            <input type="number" id="remote-id" placeholder="Nhập mã 6 số đối phương" pattern="\d*">
            <button onclick="makeCall()">GỌI VIDEO NGAY</button>
        </div>

        <div class="video-grid">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" autoplay muted playsinline></video>
        </div>

        <div class="footer-text">Tùng Anh Computer Service - 2026</div>
    </div>

    <script>
        // Tạo ID ngẫu nhiên 6 chữ số
        const customId = Math.floor(100000 + Math.random() * 900000).toString();
        const peer = new Peer(customId); 
        let localStream;

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
        });

        // Tối ưu cho Mobile: thêm playsinline để video không tự bung toàn màn hình trên iOS
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;
                document.getElementById('local-video').srcObject = stream;
            })
            .catch(err => {
                alert("Bạn cần cấp quyền Camera & Mic để gọi điện!");
            });

        peer.on('call', call => {
            if(confirm("Có cuộc gọi đến từ mã " + call.peer + ". Nhận không?")) {
                call.answer(localStream);
                call.on('stream', remoteStream => {
                    document.getElementById('remote-video').srcObject = remoteStream;
                });
            }
        });

        function makeCall() {
            const destId = document.getElementById('remote-id').value;
            if(!destId || destId.length < 6) return alert("Vui lòng nhập đúng mã 6 số!");
            
            const call = peer.call(destId, localStream);
            call.on('stream', remoteStream => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        }
    </script>
</body>
</html>
