<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina OTT - Video Call & Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Giao diện Video lồng nhau */
        .video-wrapper { position: relative; width: 100vw; height: 60vh; background: #111; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { 
            position: absolute; top: 20px; right: 20px; width: 120px; height: 160px; 
            border-radius: 12px; border: 2px solid var(--neon); object-fit: cover; z-index: 10;
        }

        /* Thanh điều khiển */
        .controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 20;
        }
        .btn-round { 
            width: 50px; height: 50px; border-radius: 50%; border: none; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px;
        }
        .btn-call { background: #22c55e; color: white; }
        .btn-end { background: #ef4444; color: white; }
        .btn-util { background: rgba(255,255,255,0.2); color: white; backdrop-filter: blur(10px); }

        /* Khu vực Chat OTT */
        .chat-section { 
            height: 40vh; background: #0a0a0a; display: flex; flex-direction: column;
            border-top: 1px solid var(--glass);
        }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; }
        .msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 10px; max-width: 80%; width: fit-content; }
        .msg.me { background: #0056b3; align-self: flex-end; margin-left: auto; }
        .msg.peer { background: #333; }
        .msg img { max-width: 100%; border-radius: 5px; margin-top: 5px; }

        .input-area { padding: 10px; display: flex; gap: 8px; background: #111; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #333; background: #000; color: white; }
        
        .id-header { position: absolute; top: 10px; left: 10px; z-index: 20; font-size: 12px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="id-header">ID: <span id="my-id">...</span> | <input id="peer-id-input" placeholder="Nhập ID gọi..." style="width: 80px; background: transparent; color: cyan; border: none; outline: none;"></div>

    <div class="video-wrapper">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        
        <div class="controls">
            <button class="btn-round btn-util" onclick="toggleMic()" id="mic-btn">🎙️</button>
            <button class="btn-round btn-call" onclick="makeCall()">📞</button>
            <button class="btn-round btn-end" onclick="endCall()">🛑</button>
            <button class="btn-round btn-util" onclick="takeSnapshot()">📸</button>
        </div>
    </div>

    <div class="chat-section">
        <div id="chat-box"></div>
        <div class="input-area">
            <label class="btn-round btn-util" style="width: 40px; height: 40px; cursor: pointer;">
                🖼️<input type="file" id="file-input" hidden accept="image/*">
            </label>
            <input type="text" id="chat-input" placeholder="Nhắn tin...">
            <button onclick="sendMsg()" style="background: none; border: none; color: var(--neon); font-size: 20px;">🚀</button>
        </div>
    </div>

    <script>
        const customId = Math.floor(100000 + Math.random() * 900000).toString();
        const peer = new Peer(customId);
        let localStream, currentCall, dataConn;

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;
        });

        // Nhận cuộc gọi & Nhận tin nhắn
        peer.on('call', call => {
            if(confirm("Cuộc gọi đến! Nghe chứ?")) {
                currentCall = call;
                call.answer(localStream);
                call.on('stream', rs => document.getElementById('remote-video').srcObject = rs);
            }
        });

        peer.on('connection', conn => {
            dataConn = conn;
            setupChat();
        });

        function makeCall() {
            const id = document.getElementById('peer-id-input').value;
            dataConn = peer.connect(id);
            setupChat();
            currentCall = peer.call(id, localStream);
            currentCall.on('stream', rs => document.getElementById('remote-video').srcObject = rs);
        }

        function setupChat() {
            dataConn.on('data', data => {
                if(data.type === 'text') appendMsg('peer', data.content);
                if(data.type === 'img') appendImg('peer', data.content);
            });
        }

        function sendMsg() {
            const txt = document.getElementById('chat-input').value;
            if(!txt || !dataConn) return;
            dataConn.send({type: 'text', content: txt});
            appendMsg('me', txt);
            document.getElementById('chat-input').value = '';
        }

        function appendMsg(sender, text) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            document.getElementById('chat-box').appendChild(div);
            div.scrollIntoView();
        }

        // Gửi ảnh
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                const base64 = reader.result;
                dataConn.send({type: 'img', content: base64});
                appendImg('me', base64);
            };
            reader.readAsDataURL(file);
        };

        function appendImg(sender, src) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = `<img src="${src}">`;
            document.getElementById('chat-box').appendChild(div);
        }

        function toggleMic() {
            const audioTrack = localStream.getAudioTracks()[0];
            audioTrack.enabled = !audioTrack.enabled;
            document.getElementById('mic-btn').innerText = audioTrack.enabled ? "🎙️" : "🔇";
        }

        function endCall() {
            if(currentCall) currentCall.close();
            location.reload(); // Cách nhanh nhất để reset trạng thái
        }

        function takeSnapshot() {
            const video = document.getElementById('remote-video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const link = document.createElement('a');
            link.download = `mina-snapshot-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
