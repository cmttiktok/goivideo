<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina OTT - Kết Nối Yêu Thương</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --success: #22c55e; --danger: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #status-bar { background: #f59e0b; color: #000; text-align: center; font-size: 13px; font-weight: bold; padding: 10px 0; z-index: 100; }
        
        .video-container { position: relative; flex: 1; background: #111; display: flex; align-items: center; justify-content: center; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #local-video { position: absolute; top: 60px; right: 15px; width: 100px; height: 130px; border-radius: 12px; border: 2px solid var(--neon); object-fit: cover; z-index: 10; box-shadow: 0 0 15px var(--neon); }

        .info-panel { position: absolute; top: 60px; left: 15px; z-index: 20; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px; border: 1px solid var(--neon); font-size: 12px; backdrop-filter: blur(5px); }
        
        #incoming-box { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 2px solid var(--neon); padding: 30px;
            border-radius: 25px; text-align: center; z-index: 1000; display: none; width: 85%;
        }

        .controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 20; }
        .btn { width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }
        .btn-call { background: var(--success); color: white; box-shadow: 0 0 15px var(--success); }
        .btn-end { background: var(--danger); color: white; box-shadow: 0 0 15px var(--danger); }
        .btn-tool { background: rgba(255,255,255,0.2); color: white; backdrop-filter: blur(10px); }

        input#peer-id { background: transparent; border: none; color: var(--neon); border-bottom: 2px solid var(--neon); width: 90px; outline: none; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

    <div id="status-bar">Đang khởi tạo hệ thống mượt mà...</div>

    <div id="incoming-box">
        <h3 style="margin:0 0 10px">Cuộc gọi đến...</h3>
        <p id="caller-name" style="color: var(--neon); font-size: 24px; font-weight: bold;">---</p>
        <div style="display: flex; justify-content: space-around; margin-top: 20px;">
            <button class="btn btn-call" onclick="answerCall()">📞</button>
            <button class="btn btn-end" onclick="rejectCall()">🛑</button>
        </div>
    </div>

    <div class="info-panel">
        ID: <span id="my-id" style="color:var(--neon); font-weight:bold;">...</span><br>
        Gọi: <input type="number" id="peer-id" placeholder="Nhập ID">
    </div>

    <div class="video-container">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        
        <div class="controls">
            <button class="btn btn-tool" onclick="toggleMic()">🎙️</button>
            <button class="btn btn-tool" onclick="toggleCam()">📹</button>
            <button class="btn btn-call" onclick="makeCall()">📞</button>
            <button class="btn btn-end" onclick="endCall()">🛑</button>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status-bar');
        const callBox = document.getElementById('incoming-box');
        const myCustomId = Math.floor(100000 + Math.random() * 900000).toString();
        
        function setStatus(msg, color) {
            statusEl.innerText = msg;
            statusEl.style.background = color;
        }

        // CẤU HÌNH TỐI ƯU GIẢM LAG
        const peer = new Peer(myCustomId, {
            debug: 1,
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    {
                        urls: 'turn:213.163.197.199:443', // IP UpCloud của anh
                        username: 'tunganh',
                        credential: 'mina2026'
                    }
                ],
                'iceTransportPolicy': 'relay', // Ép buộc dùng TURN để ổn định mạng 4G
                'iceCandidatePoolSize': 10
            }
        });

        let localStream, incomingCallObj;

        // GIẢM ĐỘ PHÂN GIẢI ĐỂ MƯỢT HƠN (480p)
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                width: { ideal: 480 }, 
                height: { ideal: 360 }, 
                frameRate: { ideal: 15, max: 20 } 
            }, 
            audio: { echoCancellation: true, noiseSuppression: true } 
        }).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;
            setStatus('Hệ thống: Sẵn sàng', '#22c55e');
        }).catch(err => {
            setStatus('Lỗi: Kiểm tra quyền Camera!', '#ef4444');
        });

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
            setStatus('Server UpCloud: Đã thông suốt', '#22c55e');
        });

        peer.on('call', call => {
            incomingCallObj = call;
            document.getElementById('caller-name').innerText = call.peer;
            callBox.style.display = 'block';
            setStatus('CÓ CUỘC GỌI ĐẾN!', '#f59e0b');
        });

        function answerCall() {
            callBox.style.display = 'none';
            incomingCallObj.answer(localStream);
            handleStream(incomingCallObj);
        }

        function makeCall() {
            const destId = document.getElementById('peer-id').value;
            if(!destId) return alert("Nhập ID nhận!");
            setStatus('Đang gọi: ' + destId, '#f59e0b');
            const call = peer.call(destId, localStream);
            handleStream(call);
        }

        function handleStream(call) {
            call.on('stream', remoteStream => {
                document.getElementById('remote-video').srcObject = remoteStream;
                setStatus('Đang trò chuyện mượt mà', '#22c55e');
            });
            call.on('close', () => location.reload());
        }

        function toggleMic() { localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; }
        function toggleCam() { localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled; }
        function endCall() { location.reload(); }
        function rejectCall() { callBox.style.display = 'none'; location.reload(); }
    </script>
</body>
</html>
