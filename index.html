<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> Ứng dụng làm mới đường truyền Viettel Net</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --zalo-blue: #0068ff; --pink: #ff85a2; --bg: #f0f2f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; height: 100vh; overflow: hidden; }
        
        /* Màn hình nhập ID ban đầu */
        #login-overlay { position: fixed; inset: 0; background: var(--zalo-blue); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .login-card input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; text-align: center; font-size: 18px; }
        
        /* Video Wrapper */
        .main-container { position: relative; width: 100%; height: 100vh; display: none; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; background: #222; }
        #local-video { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.8); object-fit: cover; z-index: 10; background: #000; }

        /* Thanh trạng thái Zalo */
        .zalo-header { position: absolute; top: 0; width: 100%; padding: 40px 15px 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent); display: flex; align-items: center; z-index: 100; }
        .back-icon { font-size: 24px; margin-right: 15px; }

        /* Khung Chat giống Zalo */
        #chat-box { position: absolute; bottom: 180px; left: 15px; right: 15px; max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; pointer-events: none; z-index: 200; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; pointer-events: auto; animation: slideUp 0.3s ease; }
        .msg.partner { background: white; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.me { background: var(--zalo-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Ô nhập tin nhắn mờ */
        .input-bar { position: absolute; bottom: 100px; left: 15px; right: 15px; display: flex; align-items: center; background: rgba(255,255,255,0.2); backdrop-filter: blur(15px); padding: 5px 15px; border-radius: 25px; z-index: 300; border: 1px solid rgba(255,255,255,0.3); }
        #chat-input { flex: 1; background: none; border: none; padding: 10px; color: white; font-size: 16px; outline: none; }
        #chat-input::placeholder { color: rgba(255,255,255,0.7); }

        /* Bộ điều khiển tròn chuẩn Zalo */
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 25px; z-index: 400; }
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 22px; background: rgba(255,255,255,0.2); color: white; backdrop-filter: blur(10px); }
        .btn-call { background: #4cd964; width: 65px; height: 65px; font-size: 28px; }
        .btn-hangup { background: #ff3b30; width: 65px; height: 65px; font-size: 28px; }

        /* Giao diện cuộc gọi đến */
        #call-overlay { position: fixed; inset: 0; background: #1e3c72; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .avatar-lg { width: 120px; height: 120px; background: var(--pink); border-radius: 50%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 4px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h3 style="margin-top:0">Vui lòng nhập mã KH để kiểm tra</h3>
            <p style="font-size:14px; color:#666">Mã KH bắt đầu bằng tên tỉnh viết tắt ví dụ như HN,HCM... </p>
            <input type="number" id="user-id-input" placeholder="Nhập Mã KH">
            <button onclick="confirmIdentity()" style="width:100%; padding:12px; background:var(--zalo-blue); color:white; border:none; border-radius:10px; font-weight:bold">KIỂM TRA</button>
        </div>
    </div>

    <div class="main-container" id="app-ui">
        <div class="zalo-header">
            <div class="back-icon">❮</div>
            <div>
                <b id="partner-name-header">Đang chờ kết nối...</b>
                <div id="status-text" style="font-size: 12px; opacity: 0.8;">Đang trực tuyến</div>
            </div>
        </div>

        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>

        <div id="chat-box"></div>

        <div class="input-bar">
            <input type="text" id="chat-input" placeholder="Tin nhắn..." onkeypress="if(event.key==='Enter') sendMsg()">
            <span onclick="sendMsg()" style="font-size:20px; cursor:pointer">🚀</span>
        </div>

        <div class="controls">
            <button class="circle-btn" onclick="toggleMic()">🎙️</button>
            <button class="circle-btn btn-call" id="call-btn" onclick="makeCall()">📞</button>
            <button class="circle-btn" onclick="toggleCam()">📹</button>
            <button class="circle-btn btn-hangup" id="hangup-btn" onclick="hangUp()" style="display:none">🛑</button>
        </div>
    </div>

    <div id="call-overlay">
        <div class="avatar-lg">🌸</div>
        <h2 id="caller-name">... đang gọi</h2>
        <div style="display:flex; gap:60px; margin-top:50px">
            <div onclick="answerCall()" style="text-align:center"><div class="circle-btn btn-call">📞</div><p>NHẬN</p></div>
            <div onclick="rejectCall()" style="text-align:center"><div class="circle-btn btn-hangup">✖</div><p>TỪ CHỐI</p></div>
        </div>
    </div>

    <audio id="ringtone" loop><source src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>

    <script>
        const ID_CHI = "mina_user_1";
        const ID_ANH = "mina_user_2";
        let myId, partnerId, peer, localStream, currentCall, dataConn;
        const ringtone = document.getElementById('ringtone');

        function confirmIdentity() {
            const input = document.getElementById('user-id-input').value;
            if(input === "1") {
                myId = ID_CHI; partnerId = ID_ANH;
                document.getElementById('partner-name-header').innerText = "Bảo Bối ❤️";
            } else if(input === "2") {
                myId = ID_ANH; partnerId = ID_CHI;
                document.getElementById('partner-name-header').innerText = "Bé Chi 🌸";
            } else {
                alert("Mã KH Sai hoặc hệ thống đang quá tải vui lòng thử lại sau! ");
                return;
            }
            
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-ui').style.display = 'block';
            startSystem();
        }

        function startSystem() {
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                localStream = stream;
                document.getElementById('local-video').srcObject = stream;
                
                peer = new Peer(myId, {
                    config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' },
                                           { urls: 'turn:213.163.197.199:443', username: 'tunganh', credential: 'mina2026' }] }
                });

                peer.on('open', id => { console.log("ID của tôi:", id); });
                
                peer.on('call', call => {
                    currentCall = call;
                    document.getElementById('call-overlay').style.display = 'flex';
                    document.getElementById('caller-name').innerText = (myId === ID_CHI) ? "Bảo Bối đang gọi..." : "Bé Chi đang gọi...";
                    ringtone.play();
                });

                peer.on('connection', conn => {
                    dataConn = conn;
                    setupDataHandlers();
                });
            });
        }

        function makeCall() {
            document.getElementById('status-text').innerText = "Đang kết nối...";
            const call = peer.call(partnerId, localStream);
            currentCall = call;
            dataConn = peer.connect(partnerId);
            setupDataHandlers();
            
            call.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
                onCallConnected();
            });
        }

        function answerCall() {
            ringtone.pause();
            document.getElementById('call-overlay').style.display = 'none';
            currentCall.answer(localStream);
            dataConn = peer.connect(currentCall.peer);
            setupDataHandlers();
            
            currentCall.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
                onCallConnected();
            });
        }

        function onCallConnected() {
            document.getElementById('call-btn').style.display = 'none';
            document.getElementById('hangup-btn').style.display = 'flex';
            document.getElementById('status-text').innerText = "Cuộc gọi đang diễn ra";
        }

        function setupDataHandlers() {
            dataConn.on('data', data => {
                if(data.type === 'CHAT') appendMsg(data.text, 'partner');
                if(data.type === 'END') showEndNotice(data.by);
            });
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(input.value.trim() && dataConn && dataConn.open) {
                dataConn.send({ type: 'CHAT', text: input.value });
                appendMsg(input.value, 'me');
                input.value = '';
            }
        }

        function appendMsg(text, type) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            if(type === 'partner') setTimeout(() => div.style.opacity = '0.6', 10000);
        }

        function hangUp() {
            const myName = (myId === ID_ANH) ? "Bảo Bối" : "Bé Chi";
            if(dataConn) dataConn.send({ type: 'END', by: myName });
            showEndNotice("Bạn");
        }

        function showEndNotice(who) {
            document.body.innerHTML = `<div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; color:white; text-align:center;">
                <h2 style="color:var(--pink)">${who} đã kết thúc cuộc gọi</h2>
                <button onclick="location.reload()" style="padding:12px 30px; border-radius:20px; border:none; background:var(--zalo-blue); color:white; font-weight:bold; margin-top:20px">QUAY LẠI</button>
            </div>`;
        }

        function toggleMic() { localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; }
        function toggleCam() { localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled; }
        function rejectCall() { ringtone.pause(); document.getElementById('call-overlay').style.display = 'none'; }
    </script>
</body>
</html>
